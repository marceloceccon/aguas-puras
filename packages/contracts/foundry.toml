[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 10_000
via_ir = false
gas_reports = ["WaterSampleRegistry", "CollectorRegistry"]
ffi = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 256

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
base = { key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api" }

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_MAINNET_RPC_URL}"
anvil = "http://127.0.0.1:8545"
