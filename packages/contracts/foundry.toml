[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 10_000
via_ir = false
gas_reports = ["WaterSampleRegistry", "CollectorRegistry"]
ffi = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 256
